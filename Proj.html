<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Cabaña - v2.9</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #d0bcff;
            --md-sys-color-on-primary: #381e72;
            --md-sys-color-secondary-container: #4a4458;
            --md-sys-color-on-secondary-container: #e8def8;
            --md-sys-color-surface: #1c1b1f;
            --md-sys-color-surface-variant: #49454f;
            --md-sys-color-on-surface: #e6e1e5;
            --md-sys-color-on-surface-variant: #cac4d0;
            --md-sys-color-background: #1c1b1f;
            --wa-green: #25D366;
            --error: #ffb4ab;
        }

        @keyframes entrance {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { background-color: var(--md-sys-color-background); color: var(--md-sys-color-on-surface); padding-bottom: 110px; min-height: 100vh; }
        
        header { background: var(--md-sys-color-surface); padding: 1.5rem 1rem 1.2rem; position: sticky; top: 0; z-index: 100; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }

        .week-selector { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 420px; background: var(--md-sys-color-secondary-container); padding: 8px 16px; border-radius: 32px; margin: 12px auto 0; }

        .week-label { font-size: 0.9rem; font-weight: 500; color: var(--md-sys-color-on-secondary-container); }
        .nav-btn { background: transparent; border: none; color: var(--md-sys-color-on-secondary-container); cursor: pointer; padding: 6px; display: flex; }
        .nav-btn:active { opacity: 0.5; }

        main { padding: 1rem; max-width: 600px; margin: 0 auto; animation: entrance 0.35s ease-out; }
        
        .welcome-card { text-align: center; padding: 2.2rem 1.5rem; background: linear-gradient(145deg, var(--md-sys-color-surface-variant), #2a282f); border-radius: 32px; margin-top: 1rem; }
        .welcome-title { font-size: 1.7rem; font-weight: 300; margin-bottom: 0.5rem; color: var(--md-sys-color-primary); }
        .current-date { font-size: 0.95rem; opacity: 0.7; margin-bottom: 2rem; text-transform: capitalize; }
        
        .status-box { background: rgba(0,0,0,0.25); padding: 1.5rem; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .status-text { margin-bottom: 1.2rem; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .status-icon { font-size: 28px; }

        .big-action-btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.1s; }
        .btn-mark-sent { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
        .big-action-btn:active { transform: scale(0.97); }

        .section-header { font-size: 0.72rem; font-weight: 700; color: var(--md-sys-color-primary); text-transform: uppercase; letter-spacing: 1.2px; margin: 2rem 0 1rem 0.5rem; }

        .md-card { background: var(--md-sys-color-surface-variant); border-radius: 28px; padding: 1.2rem; margin-bottom: 1.2rem; }

        .assignment-row { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .assignment-row:last-child { border-bottom: none; }
        .row-content { flex-grow: 1; }
        .row-label { font-size: 0.65rem; color: var(--md-sys-color-on-surface-variant); font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
        .row-value { font-size: 1.05rem; }

        .btn-group { display: flex; gap: 10px; }

        .action-btn { background: rgba(255,255,255,0.06); color: white; border: 1px solid rgba(255,255,255,0.1); width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .action-btn:active { background: var(--md-sys-color-secondary-container); }
        .wa-btn { color: var(--wa-green); }

        .person-header { font-weight: 700; color: var(--md-sys-color-primary); margin-bottom: 12px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; padding-left: 4px; }
        .task-item { background: rgba(0,0,0,0.15); padding: 12px 16px; border-radius: 20px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: #121212; display: flex; justify-content: space-around; align-items: center; z-index: 200; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--md-sys-color-on-surface-variant); font-size: 0.72rem; width: 33%; cursor: pointer; }
        .nav-item.active { color: var(--md-sys-color-primary); }
        .nav-icon-bg { width: 56px; height: 32px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
        .active .nav-icon-bg { background: var(--md-sys-color-secondary-container); }

        #toast { position: fixed; bottom: 105px; left: 50%; transform: translateX(-50%); background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); padding: 12px 24px; border-radius: 24px; font-weight: 500; font-size: 0.9rem; opacity: 0; transition: 0.3s; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.5rem; font-weight: 400;">La Cabaña</div>
    <div id="selectorContainer" class="week-selector hidden">
        <button class="nav-btn" onclick="window.changeWeek(-7)">
            <span class="material-symbols-rounded">chevron_left</span>
        </button>
        <div id="weekRangeLabel" class="week-label">...</div>
        <button class="nav-btn" onclick="window.changeWeek(7)">
            <span class="material-symbols-rounded">chevron_right</span>
        </button>
    </div>
</header>

<main id="view-home">
    <div class="welcome-card">
        <div id="greetingText" class="welcome-title">Cargando...</div>
        <div id="currentFullDate" class="current-date"></div>
        <div class="status-box" id="statusContent"></div>
    </div>
</main>

<main id="view-agenda" class="hidden">
    <div class="section-header">Entre Semana</div>
    <div id="entreSemanaBody" class="md-card"></div>
    <div class="section-header">Fin de Semana</div>
    <div id="finSemanaBody" class="md-card"></div>
</main>

<main id="view-people" class="hidden">
    <div class="section-header">Tareas por Persona</div>
    <div id="personTasksContainer"></div>
</main>

<nav class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="window.switchTab('home')">
        <div class="nav-icon-bg"><span class="material-symbols-rounded">home</span></div> Inicio
    </div>
    <div class="nav-item" id="nav-agenda" onclick="window.switchTab('agenda')">
        <div class="nav-icon-bg"><span class="material-symbols-rounded">calendar_month</span></div> Agenda
    </div>
    <div class="nav-item" id="nav-people" onclick="window.switchTab('people')">
        <div class="nav-icon-bg"><span class="material-symbols-rounded">group</span></div> Personas
    </div>
</nav>

<div id="toast">Copiado</div>

<script>
(function() {
    // NUEVOS DATOS EXTRAÍDOS DE LAS IMÁGENES (MAYO - JUNIO)
    const E = [
        {f:"3 DE MAYO", m:"MIGUEL MORENO", a:"DANIEL MARÍN", p:"YOVER RODRÍGUEZ / YEISON YANES", l:"ANIBAL MUÑOZ"},
        {f:"7 DE MAYO", m:"YOVANI RIOS", a:"BERNARDO UPEGUI", p:"JUAN DAVID GUTIERREZ / ANIBAL MUÑOZ", l:"HECTOR RIVERA"},
        {f:"10 DE MAYO", m:"JUAN ANDRÉS YEPES", a:"JORGE LUIS PAIPA", p:"ROVIRO RODRÍGUEZ / YOVER RODRÍGUEZ", l:"JOSÉ MORENO"},
        {f:"14 DE MAYO", m:"DUVÁN GONZÁLES", a:"DANIEL MARÍN", p:"ORLIN MARÍN / ANIBAL MUÑOZ", l:"HECTOR RIVERA"},
        {f:"17 DE MAYO", m:"MIGUEL MORENO", a:"DUVAN GONZALES", p:"BAYRON PITALÚA / BERNARDO UPEGUI", l:"JOSÉ MORENO"},
        {f:"21 DE MAYO", m:"JUAN ANDRÉS YEPES", a:"GERMAN MORENO", p:"LUIS RAMÍREZ / ANIBAL MUÑOZ", l:"HECTOR RIVERA"},
        {f:"24 DE MAYO", m:"YOVANI RIOS", a:"JORGE LUIS PAIPA", p:"ORLIN MARÍN / JHONATAN JARAMILLO", l:"BAYRON PITALÚA"},
        {f:"28 DE MAYO", m:"JUAN ANDRÉS YEPES", a:"ROVIRO RODRÍGUEZ", p:"BAYRON PITALÚA / JUAN DAVID GUTIERREZ", l:"HECTOR RIVERA"},
        {f:"31 DE MAYO", m:"HECTOR RIVERA", a:"DANIEL MARÍN", p:"DUVAN GONZÁLES / YOVANI RIOS", l:"JOSÉ MORENO"},
        {f:"4 DE JUNIO", m:"MIGUEL MORENO", a:"ALFONSO YEPES", p:"ORLIN MARÍN / BERNARDO UPEGUI", l:"ANIBAL MUÑOZ"},
        {f:"7 DE JUNIO", m:"DUVAN GONZALES", a:"GERMAN MORENO", p:"YEISON YANES / ANDRÉS ALVARADO", l:"HECTOR RIVERA"},
        {f:"11 DE JUNIO", m:"JUAN ANDRÉS YEPES", a:"BAYRON PITALÚA", p:"ORLIN MARÍN / JHONATAN JARAMILLO", l:"HECTOR RIVERA"},
        {f:"14 DE JUNIO", m:"MIGUEL MORENO", a:"JUAN DAVID GUTIERREZ", p:"LUIS EDO RAMIREZ / DANIEL MARÍN", l:"DANIEL MARÍN"},
        {f:"18 DE JUNIO", m:"JUAN ANDRÉS YEPES", a:"BAYRON PITALÚA", p:"DANIEL MARÍN / ROBIRO RODRIGUEZ", l:"HECTOR RIVERA"},
        {f:"21 DE JUNIO", m:"YOVANI RIOS", a:"ANIBAL MUÑOZ", p:"HECTOR RIVERA / YOVER RODRÍGUEZ", l:"JOSÉ MORENO"},
        {f:"25 DE JUNIO", m:"JUAN ANDRÉS YEPES", a:"DANIEL MARÍN", p:"YOVER RODRÍGUEZ / ORLIN MARIN", l:"HECTOR RIVERA"},
        {f:"28 DE JUNIO", m:"DUVÁN GONZÁLES", a:"JORGE LUIS PAIPA", p:"GERMAN MORENO / YEISON YANES", l:"ANIBAL MUÑOZ"}
    ];

    const F = [
        {f:"3 DE MAYO", p:"BAYRON PITALÚA", l:"JOSÉ MORENO"},
        {f:"10 DE MAYO", p:"ALEJANDRO MORENO", l:"ANIBAL MUÑOZ"},
        {f:"17 DE MAYO", p:"YOVER RODRÍGUEZ", l:"JUAN DAVID GUTIERREZ"},
        {f:"24 DE MAYO", p:"DUVAN GONZÁLES", l:"DANIEL MARÍN"},
        {f:"31 DE MAYO", p:"JHONATAN JARAMILLO", l:"JORGE LUIS PAIPA"},
        {f:"7 DE JUNIO", p:"DANIEL MARÍN", l:"BERNARDO UPEGUI"},
        {f:"14 DE JUNIO", p:"JOSÉ MORENO", l:"BAYRON PITALÚA"},
        {f:"21 DE JUNIO", p:"JUAN DAVID GUTIERREZ", l:"ALEJANDRO MORENO"},
        {f:"28 DE JUNIO", p:"HECTOR RIVERA", l:"YEISON YANES"}
    ];

    let currentViewDate = new Date();

    const parseToTime = (str) => {
        const parts = str.split(" DE ");
        const month = parts[1].includes("MAYO") ? 4 : 5; // Mayo=4, Junio=5 (JS index)
        return new Date(2026, month, parseInt(parts[0])).getTime();
    };

    const getWeekKey = () => {
        const d = new Date(currentViewDate);
        const diff = (d.getDay() === 0 ? -6 : 1 - d.getDay()); 
        const mon = new Date(d); mon.setDate(d.getDate() + diff);
        return `sent_v29_${mon.getFullYear()}_${mon.getMonth()+1}_${mon.getDate()}`;
    };

    // Función de cambio de pestaña corregida y anclada al window
    window.switchTab = (tab) => {
        ['home', 'agenda', 'people'].forEach(v => {
            const el = document.getElementById(`view-${v}`);
            const nav = document.getElementById(`nav-${v}`);
            if(el) el.classList.add('hidden');
            if(nav) nav.classList.remove('active');
        });
        document.getElementById(`view-${tab}`).classList.remove('hidden');
        document.getElementById(`nav-${tab}`).classList.add('active');
        document.getElementById('selectorContainer').classList.toggle('hidden', tab === 'home');
    };

    window.changeWeek = (d) => {
        currentViewDate.setDate(currentViewDate.getDate() + d);
        render();
    };

    window.markSent = (val) => {
        localStorage.setItem(getWeekKey(), val);
        render();
        showToast(val ? "Semana completada ✅" : "Estado restablecido");
    };

    const showToast = (m) => {
        const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    };

    const generateMsgText = (n, t) => `*[RECORDATORIO]*\nBuenas tardes mi hermano, le escribo para recordarle su asignación de:\n*${t.toUpperCase()}*\nGracias por su disposición\n\n*(Por favor para confirmar su asistencia reaccione con un "👍", de lo contrario avíseme lo antes posible. Gracias)*`;

    window.copyMsg = (n, t) => {
        const text = generateMsgText(n, t);
        const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
        showToast("Copiado al portapapeles");
    };

    window.sendWA = (n, t) => window.open(`https://wa.me/?text=${encodeURIComponent(generateMsgText(n, t))}`, '_blank');

    const createRow = (l, v) => `
        <div class="assignment-row">
            <div class="row-content"><div class="row-label">${l}</div><div class="row-value">${v}</div></div>
            <div class="btn-group">
                <button class="action-btn" onclick="window.copyMsg('${v}', '${l}')"><span class="material-symbols-rounded">content_copy</span></button>
                <button class="action-btn wa-btn" onclick="window.sendWA('${v}', '${l}')"><span class="material-symbols-rounded">chat</span></button>
            </div>
        </div>`;

    const render = () => {
        const d = new Date(currentViewDate);
        const diff = (d.getDay() === 0 ? -6 : 1 - d.getDay()); 
        const mon = new Date(d); mon.setDate(d.getDate() + diff); mon.setHours(0,0,0,0);
        const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
        const start = mon.getTime(), end = sun.getTime();

        document.getElementById('weekRangeLabel').innerText = `${mon.getDate()}/${mon.getMonth()+1} - ${sun.getDate()}/${sun.getMonth()+1}`;

        const summary = new Map();
        const addS = (n, t) => {
            if (!n || n.includes("VISITA")) return;
            n.split(/ \/ | y /).forEach(p => {
                const name = p.trim(); if(!name) return;
                if (!summary.has(name)) summary.set(name, []);
                summary.get(name).push(t);
            });
        };

        const eb = document.getElementById('entreSemanaBody'); eb.innerHTML = "";
        const fb = document.getElementById('finSemanaBody'); fb.innerHTML = "";

        E.forEach(e => {
            const t = parseToTime(e.f);
            if (t >= start && t <= end) {
                const isSun = new Date(t).getDay() === 0;
                const cont = isSun ? fb : eb;
                const items = [{l:"MICRÓFONOS", v:e.m}, {l:"ACOMODADOR", v:e.a}, {l:"PORTERÍA", v:e.p}, {l:"PLATAFORMA", v:e.l}];
                items.forEach(i => { cont.innerHTML += createRow(i.l, i.v); addS(i.v, i.l); });
            }
        });

        const mf = F.find(f => { const t = parseToTime(f.f); return t >= start && t <= end; });
        if (mf) {
            [{l:"PRESIDENTE", v:mf.p}, {l:"LECTOR", v:mf.l}].forEach(i => { fb.innerHTML += createRow(i.l, i.v); addS(i.v, i.l); });
        }

        const pc = document.getElementById('personTasksContainer'); pc.innerHTML = "";
        [...summary.keys()].sort().forEach(name => {
            const tasks = summary.get(name).map(t => `<div class="task-item"><span>${t}</span><div class="btn-group"><button class="action-btn" onclick="window.copyMsg('${name}', '${t}')"><span class="material-symbols-rounded">content_copy</span></button><button class="action-btn wa-btn" onclick="window.sendWA('${name}', '${t}')"><span class="material-symbols-rounded">chat</span></button></div></div>`).join("");
            pc.innerHTML += `<div class="md-card" style="border-radius:24px; padding:1.2rem; margin-bottom:12px;"><div class="person-header"><span class="material-symbols-rounded">account_circle</span> ${name}</div>${tasks}</div>`;
        });

        const isSent = localStorage.getItem(getWeekKey()) === 'true';
        const stCont = document.getElementById('statusContent');
        stCont.innerHTML = isSent 
            ? `<div class="status-text" style="color:var(--wa-green)"><span class="material-symbols-rounded status-icon">check_circle</span>Mensajes de la semana enviados</div><button class="big-action-btn" style="background:rgba(255,255,255,0.05); color:white;" onclick="window.markSent(false)">Desmarcar semana</button>`
            : `<div class="status-text" style="color:var(--error)"><span class="material-symbols-rounded status-icon">pending_actions</span>Mensajes pendientes</div><button class="big-action-btn btn-mark-sent" onclick="window.markSent(true)"><span class="material-symbols-rounded">send</span> Marcar como enviados</button>`;
    };

    window.onload = () => {
        const h = new Date().getHours();
        const g = h < 12 ? "Buenos días" : h < 18 ? "Buenas tardes" : "Buenas noches";
        document.getElementById('greetingText').innerText = `${g}, hermano`;
        document.getElementById('currentFullDate').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        render();
    };
})();
</script>
</body>
</html>
